# Clinical Trial Orchestration Process
# Gebaseerd op Lab 5 patronen: params, assign, sub-workflows en error handling [cite: 3, 10, 102]
main:
  params: [args]
  steps:
    - init_gateway_vars:
        assign:
          - gateway_url: "https://api-gateway-118369890374.us-central1.run.app"
          - admin_creds:
              email: "demo@example.com"
              password: "demopass123"

    - authenticate:
        [cite_start]call: http.post # Aanroep naar Identity Service via Gateway [cite: 33, 100]
        args:
          url: ${gateway_url + "/auth/login"}
          body: ${admin_creds}
        result: login_result

    - register_candidate:
        [cite_start]call: http.post # Aanroep naar Intake Service [cite: 101]
        args:
          url: ${gateway_url + "/candidates"}
          headers:
            Authorization: ${"Bearer " + login_result.body.auth_token}
            Content-Type: "application/json"
          body:
            full_name: ${args.name}
            country: ${args.country}
            conditions: ${args.conditions}
            date_of_birth: "1980-01-01"
            sex: "female" # Gefixeerd op basis van backend validatie (enum)
            # We gebruiken de ingebouwde unix_timestamp van de execution om email uniek te maken
            email: ${"wf_" + string(sys.get_env("GOOGLE_CLOUD_WORKFLOW_EXECUTION_ID")) + "@example.com"} 
        result: candidate_result

    - check_matching_eligibility:
        # Sub-workflow aanroep conform Lab 5 [cite: 166, 167]
        call: match_and_enroll_subprocess
        args:
          candidate_id: ${candidate_result.body.id}
          auth_token: ${login_result.body.auth_token}
          gateway_url: ${gateway_url}
        result: execution_outcome

    - return_final_message:
        return: ${execution_outcome}

# Sub-workflow voor coördinatie (vergelijkbaar met accept_order_subprocess) [cite: 168]
match_and_enroll_subprocess:
  params: [candidate_id, auth_token, gateway_url]
  steps:
    - coordinate_matching:
        try:
          call: http.post
          args:
            url: ${gateway_url + "/coordinate/match/" + string(candidate_id)}
            headers:
              Authorization: ${"Bearer " + auth_token}
              Content-Type: "application/json"
            body: {}
          result: coord_res
        except:
          as: e
          steps:
            - handle_rejection:
                # Vangt de 404/500 op (Matching Score < 50) [cite: 136, 153]
                return: ${"Candidate " + string(candidate_id) + " registered but no suitable trial match found."}
    
    - return_enrollment_success:
        return: ${"Candidate " + string(candidate_id) + " successfully matched and enrolled! " + coord_res.body.message}
