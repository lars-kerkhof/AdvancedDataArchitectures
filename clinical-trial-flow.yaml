main:
  params: [args]
  steps:
    - init_gateway_vars:
        assign:
          - gateway_url: "https://api-gateway-118369890374.us-central1.run.app"
          - admin_creds:
              email: "demo@example.com"
              password: "demopass123"
    - authenticate:
        call: http.post
        args:
          url: ${gateway_url + "/auth/login"}
          body: ${admin_creds}
        result: login_result
    - register_candidate:
        call: http.post
        args:
          url: ${gateway_url + "/candidates"}
          headers:
            Authorization: ${"Bearer " + login_result.body.auth_token}
            Content-Type: "application/json"
          body:
            full_name: ${args.full_name}
            email: ${args.email}
            phone: ${args.phone}
            date_of_birth: ${args.date_of_birth}
            sex: ${args.sex}
            country: ${args.country}
            conditions: ${args.conditions}
            medications: ${args.medications}
            allergies: ${args.allergies}
            contact_email_opt_in: ${args.contact_email_opt_in}
            contact_phone_opt_in: ${args.contact_phone_opt_in}
            preferred_language: ${args.preferred_language}
        result: candidate_result
    - check_matching_eligibility:
        call: match_and_enroll_subprocess
        args:
          candidate_id: ${candidate_result.body.id}
          auth_token: ${login_result.body.auth_token}
          gateway_url: ${gateway_url}
        result: execution_outcome
    - return_final_message:
        return: ${execution_outcome}

match_and_enroll_subprocess:
  params: [candidate_id, auth_token, gateway_url]
  steps:
    - coordinate_matching:
        try:
          call: http.post
          args:
            url: ${gateway_url + "/coordinate/match/" + string(candidate_id)}
            headers:
              Authorization: ${"Bearer " + auth_token}
              Content-Type: "application/json"
            body: {}
          result: coord_res
        except:
          as: e
          steps:
            - handle_rejection:
                # DEBUG: Geeft de volledige error terug in plaats van een standaardtekst
                return: ${e}
    - return_enrollment_success:
        return: '${"Candidate " + string(candidate_id) + " successfully matched and enrolled! Details: " + json.encode_to_string(coord_res.body)}'
